# 工作流名称
name: pull-tag-push
# 工作流运行时显示名称
run-name: ${{ github.actor }} is Sync Images to Aliyun Registry.
# 怎样触发工作流
on:
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
    inputs:
      image_name:
        description: '源镜像名称 (如: docker.io/hoppscotch/hoppscotch)'
        required: true
        type: string
        default: 'docker.io/hoppscotch/hoppscotch'
      image_tag:
        description: '镜像版本标签 (如: latest)'
        required: true
        type: string
        default: 'latest'

# 工作流程任务（通常含有一个或多个步骤）
jobs:
  syncimages:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repos
      uses: actions/checkout@v4
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        registry: registry.cn-hangzhou.aliyuncs.com
        username: ${{ secrets.DOCKERUSERNAME }}
        password: ${{ secrets.DOCKERPASSWORD }}
        logout: false
        
    - name: Use Docker Tools Sync Image to Aliyun Registry
      run: |
        #!/usr/bin/env bash
        IMAGE_NAME="${{ github.event.inputs.image_name }}"
        IMAGE_TAG="${{ github.event.inputs.image_tag }}"
        
        # 提取镜像名最后一部分作为目标仓库名 (例如: docker.io/hoppscotch/hoppscotch -> hoppscotch)
        REPO_NAME=$(basename "${IMAGE_NAME}")
        
        SOURCE="${IMAGE_NAME}:${IMAGE_TAG}"
        TARGET="registry.cn-hangzhou.aliyuncs.com/gshub/${REPO_NAME}:${IMAGE_TAG}"
        
        echo "Pulling image from ${SOURCE}"
        docker pull "${SOURCE}"
        
        echo "Tagging image ${SOURCE} to ${TARGET}"
        docker tag "${SOURCE}" "${TARGET}"
        
        echo "Pushing image to ${TARGET}"
        docker push "${TARGET}"
